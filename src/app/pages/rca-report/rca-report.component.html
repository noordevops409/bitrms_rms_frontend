<div class="parent-container">
    <div class="header">
        <div class="add-report" style="display:inline-flex;">
            <button class="btn btn-default" routerLink="add" style="margin-right:5px">
                <span class="material-icons">add</span> ADD
            </button>
            <button class="btn btn-primary" (click)="openTabularFilter($event);">FILTERS</button>
            <app-global-search (searchEventTrigger)="searchGlobally($event)"></app-global-search>
        </div>

        <div class="export">
            <button class="btn btn-default" (click)="exportExcel($event);">
                EXPORT TO EXCEL
            </button>
            <button class="btn btn-default" (click)="exportCSV($event);">
                EXPORT TO CSV
            </button>
        </div>
    </div>

    <div class="table-listing">
        <div class="box">
            <div class="box-title">
                <h4>RCA Report</h4>
            </div>
            <div class="box-body">
                <!-- <div class="tabular-filter-wrapper" [ngClass]="{'open': isOpenTabularFilter}">
                    <app-tower-filter-wrapper [filterType]=2 [(isOpenTabularFilter)]="isOpenTabularFilter"
                        [defaultFilterList]="defaultFilterList" (onFilter)="applyFilter($event)">
                    </app-tower-filter-wrapper>
                </div> -->
                <div class="list-wrap">
                    <div class="view-holder">
                        <div class="listing-container" [ngClass]="{'aLoader': isLoading, 'failed': isListServerError}">
                            <app-table-listing [listData]="activeListing.list" [appType]="appType"
                                [template]="listingTemplate" [inifiniteScroll]=true [pager]=false
                                (onRowSelectionChange)="onRowSelectionChanged($event)"
                                (onSelectionChange)="loadListing($event)">
                            </app-table-listing>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<router-outlet></router-outlet>
