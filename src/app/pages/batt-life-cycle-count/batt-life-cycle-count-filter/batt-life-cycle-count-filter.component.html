<div class="filter-wrapper" [ngClass]="{'open': isOpenTabularFilter}">
    <div class="filter-header">
        <h4>Filters</h4>
        <button class="close-btn" (click)="closeFilter()">
            <span class="close-icon">&times;</span>
        </button>
    </div>
    
    <div class="filter-body">
        <!-- Dropdown filters in 2-column grid -->
        <div class="filters-grid">
            <ng-container *ngFor="let filter of defaultFilterList">
                <div class="grid-item" *ngIf="filter?.dataType === 'Dropdown' && filter?.fieldName !== 'clusters'">
                    <app-custom-select-dd [isOpen]="filter.isOpen" [ddData]="filter" 
                        (onDropdownClose)="closeFilterDropdown($event)" 
                        (onSelectionChange)="onFilterChange($event)">
                    </app-custom-select-dd>
                </div>
            </ng-container>
        </div>

        <!-- Report Type and Date Range in same row -->
        <div class="filters-grid report-date-row">
            <!-- Report Type -->
            <div class="grid-item report-type-grid-item" *ngIf="filterType === 2">
                <label class="grid-label">Report Type</label>
                <select class="report-type-dropdown" [(ngModel)]="selectedReportType" (change)="onReportTypeDropdownChange()">
                    <option value="daily">Daily</option>
                    <option value="monthly">Monthly</option>
                    <option value="yearly">Yearly</option>
                    <option value="custom">Custom</option>
                </select>
            </div>

            <!-- Date Range picker -->
            <div class="grid-item date-range-grid-item" *ngIf="filterType !== 2 || selectedReportType === 'daily' || selectedReportType === 'custom'">
                <label class="grid-label">Date Range</label>
                <mat-form-field class="form-field" appearance="fill">
                    <mat-label>Enter a date range</mat-label>
                    <mat-date-range-input [formGroup]="range" [rangePicker]="picker" [max]="maxDate">
                        <input matStartDate formControlName="start" placeholder="Start date" [max]="maxDate">
                        <input matEndDate formControlName="end" (dateChange)="dateRangeChange('change', $event)" placeholder="End date" [max]="maxDate">
                    </mat-date-range-input>
                    <mat-hint>MM/DD/YYYY - MM/DD/YYYY</mat-hint>
                    <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
                    <mat-date-range-picker #picker></mat-date-range-picker>
                    <mat-error *ngIf="range.controls.start.hasError('matStartDateInvalid')">Invalid start date</mat-error>
                    <mat-error *ngIf="range.controls.end.hasError('matEndDateInvalid')">Invalid end date</mat-error>
                </mat-form-field>
            </div>
        </div>

        <!-- Month + Year picker -->
        <div class="date-section" *ngIf="filterType === 2 && selectedReportType === 'monthly'">
            <label>Month / Year</label>
            <div class="month-year-selectors">
                <select class="custom-select" [(ngModel)]="selectedMonth" (change)="onMonthYearChange()">
                    <option *ngFor="let m of months" [value]="m.value">{{ m.label }}</option>
                </select>
                <select class="custom-select" [(ngModel)]="selectedYear" (change)="onMonthYearChange()">
                    <option *ngFor="let y of years" [value]="y">{{ y }}</option>
                </select>
            </div>
        </div>

        <!-- Year picker -->
        <div class="date-section" *ngIf="filterType === 2 && selectedReportType === 'yearly'">
            <label>Year</label>
            <div class="year-selector">
                <select class="custom-select" [(ngModel)]="selectedYear" (change)="onYearChange()">
                    <option *ngFor="let y of years" [value]="y">{{ y }}</option>
                </select>
            </div>
        </div>
    </div>

    <div class="apply-btn">
        <button class="btn btn-primary" (click)="applyFilter($event);">APPLY</button>
        <button class="btn btn-primary-outline" (click)="reset();">RESET</button>
    </div>
</div>
