<div class="parent-container">
    <div class="header">
        <div class="add-report" style="display:inline-flex;">
            <!-- <button class="btn btn-default" (click)="add($event);" style="margin-right:5px">
                <span class="material-icons">add</span> ADD
            </button> -->
            <button class="btn btn-primary" (click)="openTabularFilter($event);">FILTERS</button>
            <app-global-search (searchEventTrigger)="searchGlobally($event)"></app-global-search>
        </div>

        <div class="export">
            <!-- <button class="btn btn-default" (click)="exportExcel($event);">
                EXPORT TO EXCEL
            </button> -->
            <button class="btn btn-default" (click)="exportCSV($event);">
                EXPORT TO CSV
            </button>
        </div>
    </div>

    <div class="table-listing">
        <div class="box">
            <div class="box-title">
                <h4>Battery Life Cycle Count</h4>
            </div>
            <div class="box-body">
                <div class="tabular-filter-wrapper" [ngClass]="{'open': isOpenTabularFilter}">
                    <app-batt-life-cycle-count-filter [filterType]=2 [(isOpenTabularFilter)]="isOpenTabularFilter"
                        [defaultFilterList]="defaultFilterList" (onFilter)="applyFilter($event)">
                    </app-batt-life-cycle-count-filter>
                </div>
                <div class="list-wrap">
                    <div class="view-holder">

                        <div class="export-container" [ngClass]="{'show': isExporting}" *ngIf="activeListing.list && activeListing.list.data">
                            <table id="export-data">
                                <thead>
                                    <tr>
                                      
                                        <th>SiteId</th>
                                        <th>SiteCode</th>
                                        <th>Timestamp</th>
                                        <th>Powersource</th>
                                        <th>Battery_Life_Cycle_Count</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr *ngFor="let item of activeListing.list.data">
                                        <td>{{item.smSiteID}}</td>
                                        <td>{{item.smSiteCode}}</td>
                                        <td>{{item.hpdate}}</td>
                                        <td>{{item.powerSource}}</td>
                                        <td>{{item.batt_lifecyclecount}}</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <div class="listing-container" [ngClass]="{'aLoader': isLoading, 'failed': isListServerError}">
                            <app-table-listing [listData]="activeListing.list" [appType]="appType"
                                [template]="listingTemplate" [inifiniteScroll]=true [pager]=false
                                (onRowSelectionChange)="onRowSelectionChanged($event)"
                                (onSelectionChange)="loadListing($event)">
                            </app-table-listing>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<router-outlet></router-outlet>
