    <div class="header">

        <div class="filter-btn add-report">
            <button class="btn btn-primary" (click)="openTabularFilter($event);">FILTERS</button>
            <app-global-search (searchEventTrigger)="searchGlobally($event)"></app-global-search>
        </div>

        <div class="right-side">
            <!-- <div class="form-group">
                <label for="fileFormat">Select File Format:</label>
                <select id="fileFormat" class="form-control" [(ngModel)]="selectedFormat">
                  <option value="csv">CSV</option>
                  <option value="excel">Excel</option>
                </select>
              </div>
              <button class="btn btn-primary" (click)="dropboxReport(selectedFormat, $event)">Generate Report on DropBox</button>
             -->
            <!-- <button class="btn btn-primary"  (click)="dropboxReport($event)">Generate Report on DropBox</button> -->

            <button class="btn btn-primary" (click)="fetchData($event)">FETCH</button>
            <div class="export" >
                <!-- <label style="padding-top: 10px;">Export</label>
                <div class="select-container">
                    <select class="mini" [(ngModel)]="selectedFormat" style="margin-right: 10px;">
                        <option value="-1">Please Select</option>
                        <option value="csv">Export Excel</option>
                        <option value="excel">Export CSV</option>
                    </select>
                    <button class="btn btn-primary" (click)="dropboxReport(selectedFormat, $event)">Export Raw Data</button>
                </div> -->
                <div class="loading-container" *ngIf="isDownloading">
                    <div class="loading-spinner"></div>
                </div>
                
            </div>
            
        </div>

    </div>

    <div class="table-listing">
        <div class="box raw-data-summary">
            <div class="box-title">
                <h4>Raw Data Report</h4>
                <div class="summary-data">
                      
                    <button class="btn btn-primary" style="text-decoration: none;">
                        <span style="text-transform: uppercase;">Dropbox Link : </span> 
                        <a href="{{ dropboxLink }}" target="_blank" style="text-transform: lowercase; text-decoration: underline; font-size: 16px;">{{ dropboxLink }}</a>
                    </button>
                    
                </div>
            </div>

            <div class="box-body">
                <div class="tabular-filter-wrapper" [ngClass]="{'open': isOpenTabularFilter}">
                    <app-raw-filter [filterType]=2 [(isOpenTabularFilter)]="isOpenTabularFilter"
                        [defaultFilterList]="defaultFilterList" (onFilter)="applyFilter($event)" (onFilterExcel)="applyFilterForExport($event)" >
                    </app-raw-filter>
                </div>
                <div class="list-wrap">
                    <div class="view-holder">
                        <div class="listing-container" [ngClass]="{'aLoader': isLoading, 'failed': isListServerError}">
                            <app-table-listing [ngClass]="{'hasNoData': hasNoData}" [listData]="activeListing.list"
                                [appType]="appType" [template]="listingTemplate" [inifiniteScroll]=false [pager]=true
                                (onRowSelectionChange)="onRowSelectionChanged($event)"
                                (onSelectionChange)="loadListing($event)">
                            </app-table-listing>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
