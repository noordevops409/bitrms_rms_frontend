<div class="filter-wrapper" [ngClass]="{'open': isReqToOpenFilter}">
    <h4>Filters</h4>
    <div class="filter-criteria">
        <div class="dropdown-container">
            <app-filter-wrapper class="filter-container fit-to-parent" [defaultFilterList]="defaultFilterList"
                [listingType]="1" (onSelectionChange)="onFilterChange($event)"
                (onFilterChange)="onFilterChange($event)">
            </app-filter-wrapper>
        </div>
        <div class="checkbox-container">
          <div class="elem-row">
                <label>Site Type</label>
                <ul>
                    <li *ngFor="let item of siteType">
                        <app-checkbox class="status-basic nb-transition" [inputData]="item">
                        </app-checkbox>
                    </li>
                </ul>
            </div> 

            <div class="elem-row" style="display: none;">
                <label>Date</label>

                <mat-form-field class="form-field" appearance="fill">
                    <mat-label>Enter a date range</mat-label>
                    <mat-date-range-input [formGroup]="range" [rangePicker]="picker">
                        <input matStartDate formControlName="start" placeholder="Start date">
                        <input matEndDate formControlName="end" (dateChange)="dateRangeChange('change', $event)" placeholder="End date">
                    </mat-date-range-input>
                    <mat-hint>MM/DD/YYYY – MM/DD/YYYY</mat-hint>
                    <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
                    <mat-date-range-picker #picker></mat-date-range-picker>

                    <mat-error *ngIf="range.controls.start.hasError('matStartDateInvalid')">Invalid start date
                    </mat-error>
                    <mat-error *ngIf="range.controls.end.hasError('matEndDateInvalid')">Invalid end date
                    </mat-error>
                </mat-form-field>
            </div>
        </div>
    </div>
    <div class="apply-btn">
        <button class="btn btn-primary" (click)="applyFilter($event);">APPLY</button>
        <button class="btn btn-primary-outline" (click)="reset($event);">RESET</button>
    </div>
</div>
