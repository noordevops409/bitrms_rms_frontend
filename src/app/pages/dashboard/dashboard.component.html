            <div class="box tower-chart">
                <div class="box-title">
                    <h4>Tower Information</h4>
                </div>
                <div class="box-body" [ngClass]="{'open': isReqToOpenFilter}">
                    <div class="ct-chart" id="websiteViewsChart"></div>
                    <app-tower-filter-wrapper [filterType]=1 [(isReqToOpenFilter)]="isReqToOpenFilter"
                        [defaultFilterList]="defaultFilterList" (onFilter)="applyFilter($event)">
                    </app-tower-filter-wrapper>
                </div>
                <div class="box-footer tower-actions-btn">
                    <button class="btn btn-default" (click)="openTabular($event);">TABULAR VIEW</button>
                    <button class="btn btn-primary" (click)="openFilter($event);">FILTERS</button>
                </div>
            </div>

    <div class="tower-listing">
        <div class="header">
            <div class="back-filter">
                <button class="btn btn-default" (click)="openTabular($event);">
                    <span class="material-icons">
                        arrow_back_ios
                    </span> DASHBOARD
                </button>
                <button class="btn btn-primary" (click)="openTabularFilter($event);">FILTERS</button>
            </div>
            <div class="export">
                <label>Export</label>
                <select class="mini">
                    <option value="1">Excel</option>
                    <option value="2">CSV</option>
                    <option value="3">PDF</option>
                </select>
            </div>
        </div>
        <div class="box">
            <div class="box-title">
                <h4>Tower Status</h4>
            </div>
            <div class="box-body">
                <div class="tabular-filter-wrapper" [ngClass]="{'open': isOpenTabularFilter}">
                    <app-tower-filter-wrapper [filterType]=2 [(isOpenTabularFilter)]="isOpenTabularFilter"
                        [defaultFilterList]="defaultFilterList" (onFilter)="applyFilter($event)">
                    </app-tower-filter-wrapper>
                </div>
                <div class="list-wrap">
                    <div class="view-holder">
                        <div class="listing-container" [ngClass]="{'aLoader': isLoading, 'failed': isListServerError}">
                            <app-table-listing [listData]="activeListing.list" [appType]="appType"
                                [template]="listingTemplate" [inifiniteScroll]=true [pager]=false
                                (onRowSelectionChange)="onRowSelectionChanged($event)"
                                (onSelectionChange)="loadListing($event)">
                            </app-table-listing>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
