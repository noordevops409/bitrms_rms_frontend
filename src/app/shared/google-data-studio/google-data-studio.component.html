<div class="parent-container row">
    <div class="col-3 tower-listing" *ngIf="isReqToShowSiteList" style="padding-left: 0px;">
        <div class="search-box">
            <input type="search" id="search" (input)="search($event);" name="search" placeholder="Search" />
            <span class="search-icon material-icons">
                search
            </span>
        </div>

        <div class="box">
            <div class="box-title">
                <h4>Tower Status</h4>
            </div>
            <div class="box-body">
                <div class="list-head">
                    <ul>
                        <li class="site-item">Sr. No.</li>
                        <li class="site-item">Site ID</li>
                    </ul>
                </div>
                <div class="list-body">
                    <ul *ngFor="let item of siteList; let i = index">
                        <li class="site-item">{{ (i+1) }}</li>
                        <li class="site-item">{{ item.smSitecode }}</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <div class="col-12 tower-status" style="padding-right: 0px;">
        <div class="box">
            <div class="box-title">
                <h4>Tower Status</h4>
            </div>
            <div class="box-body">
                <div class="map" id="mapbox" class="match-parent"></div>
            </div>
        </div>
    </div>

    <div class="legend">
        <ul>
            <li class="online-no-alarms"><span></span> Online No Alarms</li>
            <li class="offline-no-alarms"><span></span> Offline No Alarms</li>
            <li class="online-critical-alarms"><span></span> Online Critical Alarms</li>
            <li class="offline"><span></span> Offline</li>
        </ul>
    </div>
</div>
