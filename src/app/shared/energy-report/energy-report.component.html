<div class="parent-container">
    <div class="header">

        <div class="filter-btn add-report">
            <button class="btn btn-primary" (click)="openTabularFilter($event);">FILTERS</button>
        </div>

        <!-- <div class="right-side">
            <div class="export">
                <button class="btn btn-default" (click)="exportExcel($event);">
                    EXPORT TO EXCEL
                </button>
                <button class="btn btn-default" (click)="exportCSV($event);">
                    EXPORT TO CSV
                </button>
            </div>
        </div> -->

    </div>

    <div class="table-listing">
        <div class="box">
            <div class="box-title">
                <h4>Energy Report</h4>
            </div>
            <div class="box-body">
                <div class="tabular-filter-wrapper" [ngClass]="{'open': isOpenTabularFilter}">
                    <app-tower-filter-wrapper [filterType]=2 [isTimerAvail]=true [(isOpenTabularFilter)]="isOpenTabularFilter"
                        [defaultFilterList]="defaultFilterList" (onFilter)="applyFilter($event)">
                    </app-tower-filter-wrapper>
                </div>

                <div class="list-wrap" style="background-color: transparent;">
                    <div class="view-holder">
                        <div class="chart-container" [ngClass]="{'aLoader': isChartLoading}">
                            <canvas class="ct-chart hourly-chart fuel-consumption" baseChart [type]="'line'"
                                [data]="lineChartData" [options]="lineChartOptions" [legend]="lineChartLegend">
                            </canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
