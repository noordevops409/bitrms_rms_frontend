<div class="login-container">
  <div class="card">
    <div class="card-header">
      <img src="assets/images/yoma_logo.png" alt="Company Logo" title="Company Logo" />
    </div>
    <div class="card-body">
      <form [formGroup]="loginForm" class="form">

        <div class="form-group" style="margin-bottom: 0px;">
          <mat-form-field class="fullWidth form-field">
            <mat-label class="label">Email Id *</mat-label>
            <input formControlName="email" class="input-full-width size-medium status-basic shape-rectangle nb-transition" matInput />
            <mat-error *ngIf="lf.email.touched && lf.email.hasError('invalidUsername')">
              <div class="italicAlign">Invalid username. Please try again.</div>
            </mat-error>
          </mat-form-field>
        </div>

        <div class="form-group" style="margin-bottom: 0px;">
          <mat-form-field class="fullWidth form-field">
            <mat-label class="label">Password *</mat-label>
            <input formControlName="password"
              class="input-full-width size-medium status-basic shape-rectangle nb-transition"
              type="password" matInput />
            <mat-error *ngIf="lf.password.touched && lf.password.hasError('invalidPassword')">
              <div class="italicAlign">Invalid password. Please try again.</div>
            </mat-error>
          </mat-form-field>
        </div>

        <div class="footer" style="padding: 15px 0px 50px 0px;">
          <button class="btn btn-primary" (click)="login($event)" [disabled]="loginForm.invalid">Login
            <mat-icon class="imgPreIcon rotating" *ngIf="isLogining">
              autorenew
            </mat-icon>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
